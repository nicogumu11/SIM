<!DOCTYPE html>
 <html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario - Monguí</title>

<style>
body { 
font-family: Arial,
sans-serif;
background: linear-gradient(to right, #4facfe, #00f2fe); 
    margin: 0; 
}
header { background-color: #0D47A1; 
    color: white;
    text-align: center;
    padding: 20px;
 } 
form { 
    background: white;
    max-width: 500px;
    margin: 40px auto;
    padding: 25px; 
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    } 

label { font-weight: bold; 
} 
input, select, textarea { 
width: 100%;
padding: 10px;
margin: 8px 0 15px 0;
border-radius: 8px;
border: 1px solid #ccc;
 }
input[type="radio"],
input[type="checkbox"] {
  width: auto;
} 
button { 
background-color: #0D47A1;
color: white;
padding: 12px;
border: none;
width: 100%;
border-radius: 8px;
font-size: 16px;
cursor: pointer;
    }
button:hover {
background-color: #1565C0; 
    }
    h1 {
    margin: 0; 

    }
</style> 
</head> 
<body>
<header>
    <h1>formulario sobre mongui</h1> <p>Cuéntanos tu interés en este hermoso lugar</p>
</header>
<form>

<label>Nombre:</label>
<input type="text" required>
      	   	   	     	              
<label>Correo:</label> 
<input type="email" required>

<label>¿Has visitado Monguí?</label><br>
<input type="radio" name="visita"> Sí
<input type="radio" name="visita"> No<br><br>

<label>¿Qué te interesa más?</label><br>
<input type="checkbox"> Historia
<input type="checkbox"> Cultura
<input type="checkbox"> Turismo<br><br>

<label>¿Cuándo te gustaría viajar?</label>
<input type="date">

<label>Mensaje:</label>
<textarea rows="4"></textarea>

<button>Enviar</button>

</form>

</body>
</html>
